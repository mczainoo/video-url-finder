<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Video URL Finder — Player</title>
    <link rel="stylesheet" href="phosphor.css" />
    <link rel="stylesheet" href="vendor/plyr/plyr.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="mx-auto flex min-h-screen max-w-5xl flex-col justify-center gap-4 p-4 sm:p-6">
      <header class="flex items-center gap-2.5">
        <span class="flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-indigo-500/15 text-indigo-400">
          <i class="ph ph-video text-base leading-none"></i>
        </span>
        <h1 class="text-[13px] font-semibold tracking-wide text-slate-300">Video URL Finder</h1>
      </header>

      <div class="overflow-hidden rounded-xl bg-black shadow-2xl shadow-black/50 ring-1 ring-white/10">
        <video id="player" playsinline controls preload="auto"></video>
      </div>

      <div class="flex flex-wrap items-center gap-2.5 rounded-xl bg-slate-900/70 px-3 py-2.5 ring-1 ring-white/5">
        <span id="extBadge" class="hidden shrink-0 rounded-md px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wide"></span>
        <p id="title" class="min-w-0 flex-1 truncate text-[12.5px] text-slate-400"></p>

        <div class="flex shrink-0 items-center gap-1">
          <button
            id="copyBtn"
            title="Copy URL"
            class="inline-flex items-center gap-1.5 rounded-md border border-white/10 bg-white/5 px-2.5 py-1.5 text-xs font-medium text-slate-300 transition hover:bg-white/10 hover:text-white active:scale-95"
          >
            <i class="ph ph-copy text-sm leading-none"></i>
            <span class="hidden sm:inline">Copy</span>
          </button>
          <button
            id="shareBtn"
            title="Share URL"
            class="inline-flex items-center gap-1.5 rounded-md border border-white/10 bg-white/5 px-2.5 py-1.5 text-xs font-medium text-slate-300 transition hover:bg-white/10 hover:text-white active:scale-95"
          >
            <i class="ph ph-share-network text-sm leading-none"></i>
            <span class="hidden sm:inline">Share</span>
          </button>
          <button
            id="potBtn"
            title="Open in PotPlayer"
            class="inline-flex items-center gap-1.5 rounded-md border border-indigo-400/30 bg-indigo-500/15 px-2.5 py-1.5 text-xs font-medium text-indigo-300 transition hover:bg-indigo-500/25 hover:text-indigo-200 active:scale-95"
          >
            <i class="ph ph-play text-sm leading-none"></i>
            <span class="hidden sm:inline">PotPlayer</span>
          </button>
        </div>
      </div>

      <p
        id="error"
        class="hidden rounded-xl bg-amber-500/10 px-3 py-2.5 text-sm text-amber-400 ring-1 ring-amber-500/20"
      ></p>
    </div>

    <script src="common.js"></script>
    <script src="vendor/hls/hls.min.js"></script>
    <script src="vendor/dash/dash.all.min.js"></script>
    <script src="vendor/plyr/plyr.min.js"></script>
    <script src="player.js"></script>
  </body>
</html>
