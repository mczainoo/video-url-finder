<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Video URL Finder</title>
    <link rel="stylesheet" href="phosphor.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="w-[420px] bg-white text-slate-800 antialiased dark:bg-slate-900 dark:text-slate-100">
    <header class="flex items-center gap-2.5 border-b border-slate-200/80 bg-linear-to-r from-indigo-600 to-indigo-500 px-4 py-3 dark:border-slate-800">
      <span class="flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-white/15 text-white">
        <i class="ph ph-video text-base leading-none"></i>
      </span>
      <h1 class="flex-1 text-[13px] font-semibold tracking-wide text-white">Video URL Finder</h1>
      <button
        id="rescan"
        title="Rescan this page"
        class="inline-flex items-center gap-1.5 rounded-md border border-white/25 bg-white/10 px-2.5 py-1.5 text-xs font-medium text-white transition hover:bg-white/20 active:scale-95"
      >
        <i id="rescanIcon" class="ph ph-arrow-clockwise text-sm leading-none transition-transform duration-500"></i>
        Rescan
      </button>
    </header>

    <div class="flex items-center justify-between border-b border-slate-200 bg-slate-50 px-4 py-2 dark:border-slate-800 dark:bg-slate-800/60">
      <span id="count" class="text-xs font-medium text-slate-500 dark:text-slate-400">Scanning…</span>
      <button
        id="copyAll"
        disabled
        class="inline-flex items-center gap-1.5 rounded-md bg-indigo-600 px-2.5 py-1.5 text-xs font-medium text-white transition hover:bg-indigo-700 active:scale-95 disabled:cursor-default disabled:bg-slate-300 disabled:text-slate-500 dark:disabled:bg-slate-700 dark:disabled:text-slate-500"
      >
        <i class="ph ph-copy text-sm leading-none"></i>
        Copy all
      </button>
    </div>

    <div id="status" class="flex-col items-center gap-2 px-6 py-10 text-center text-sm text-slate-400 dark:text-slate-500" style="display: none"></div>

    <ul id="list" class="max-h-[400px] divide-y divide-slate-100 overflow-y-auto dark:divide-slate-800"></ul>

    <template id="itemTemplate">
      <li class="group flex items-center gap-2.5 px-4 py-2.5 transition hover:bg-slate-50 dark:hover:bg-slate-800/60">
        <span class="ext shrink-0 rounded-md px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wide"></span>
        <a
          class="url flex min-w-0 flex-1 items-center gap-1 truncate text-[12.5px] text-slate-700 hover:text-indigo-600 hover:underline dark:text-slate-300 dark:hover:text-indigo-400"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="urlText min-w-0 flex-1 truncate"></span>
          <i class="ph ph-arrow-square-out shrink-0 text-xs opacity-0 group-hover:opacity-60"></i>
        </a>
        <button
          class="playBtn shrink-0 rounded-md p-1.5 text-slate-400 opacity-0 transition hover:bg-slate-200 hover:text-indigo-600 group-hover:opacity-100 dark:hover:bg-slate-700 dark:hover:text-indigo-400"
          title="Play in PotPlayer"
        >
          <i class="ph ph-play text-sm leading-none"></i>
        </button>
        <button
          class="copyBtn shrink-0 rounded-md p-1.5 text-slate-400 opacity-0 transition hover:bg-slate-200 hover:text-slate-700 group-hover:opacity-100 dark:hover:bg-slate-700 dark:hover:text-slate-200"
          title="Copy URL"
        >
          <i class="ph ph-copy text-sm leading-none"></i>
        </button>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
